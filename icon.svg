<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Via B. Chimirri parcheggi">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f7ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1597ff"/>
      <stop offset="1" stop-color="#0573e7"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c889"/>
      <stop offset="1" stop-color="#12a86f"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#0b1f3d" flood-opacity="0.16"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0b1f3d" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- app tile -->
  <rect x="18" y="18" width="988" height="988" rx="112" fill="url(#bg)"/>
  <rect x="26" y="26" width="972" height="972" rx="104" fill="none" stroke="#dbeaff" stroke-width="5"/>

  <!-- street sign -->
  <g filter="url(#smallShadow)">
    <rect x="252" y="118" width="520" height="168" rx="36" fill="#ffffff"/>
    <rect x="270" y="136" width="484" height="132" rx="24" fill="none" stroke="#071735" stroke-width="13"/>
    <text x="512" y="192" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800" fill="#071735">via</text>
    <text x="512" y="252" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="900" fill="#071735" letter-spacing="-2">b. chimirri</text>
  </g>

  <!-- parking road -->
  <g filter="url(#softShadow)">
    <path d="M320 804 L415 589 Q427 560 457 560 H567 Q597 560 609 589 L704 804 Z" fill="#071735"/>
    <line x1="300" y1="758" x2="438" y2="758" stroke="#ffffff" stroke-width="17" stroke-linecap="round" opacity="0.96"/>
    <line x1="586" y1="758" x2="724" y2="758" stroke="#ffffff" stroke-width="17" stroke-linecap="round" opacity="0.96"/>
    <line x1="512" y1="735" x2="512" y2="783" stroke="#ffffff" stroke-width="17" stroke-linecap="round" opacity="0.96"/>

    <!-- P block -->
    <rect x="322" y="322" width="380" height="400" rx="88" fill="url(#blue)"/>
    <text x="512" y="616" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="258" font-weight="900" fill="#ffffff">P</text>
  </g>

  <!-- small color markers -->
  <g filter="url(#smallShadow)">
    <circle cx="200" cy="724" r="40" fill="url(#green)"/>
    <rect x="160" y="789" width="80" height="17" rx="8.5" fill="url(#green)"/>
    <circle cx="824" cy="724" r="40" fill="url(#blue)"/>
    <rect x="784" y="789" width="80" height="17" rx="8.5" fill="url(#blue)"/>
  </g>
</svg>
